- date: "2026-04"
  month: "Apr"
  title: "SlaClip accepted to ICML 2026 as a Spotlight paper"
  home_title: "One paper accepted to ICML 2026 as Spotlight (top 2.2%)!"
  summary: "Shuyan Zou's work on adaptive clipping in differentially private stochastic gradient descent was selected as an ICML 2026 Spotlight paper (top 2.2%)."
  body_html: >-
    🎉 Our PhD student Shuyan Zou's paper <a href="/lab/publication/"><em>"SlaClip: Gradient Norm Slacks can be Indicator for Adaptive Clipping in DP-SGD"</em></a> was accepted to <strong>ICML 2026</strong> as a <strong>Spotlight (top 2.2%)</strong> paper. Congratulations to Shuyan and all co-authors!
  venue_short: "ICML"
  image: "/assets/lab/news/ICML_logo_2026.svg.webp"
  url: "/lab/publication/"

